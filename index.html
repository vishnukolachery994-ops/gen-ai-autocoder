<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GenAI AutoCoder - POC</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        #fileList::-webkit-scrollbar { width: 8px; }
        #fileList::-webkit-scrollbar-track { background: #000; }
        #fileList::-webkit-scrollbar-thumb { background: #334155; border-radius: 4px; }
        .log-line { animation: fadeIn 0.2s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="bg-slate-900 text-white min-h-screen flex flex-col items-center justify-center p-4">
    <div class="max-w-2xl w-full bg-slate-800 p-8 rounded-2xl shadow-2xl border border-slate-700">
        <h1 class="text-3xl font-bold mb-2 text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-emerald-400">
            GenAI AutoCoder
        </h1>
        <p class="text-slate-400 mb-8">Enter a master prompt to generate a full-stack application autonomously.</p>

        <div class="space-y-4">
            <textarea id="prompt" rows="3" 
                class="w-full p-4 rounded-xl bg-slate-900 border border-slate-700 focus:ring-2 focus:ring-blue-500 outline-none transition-all"
                placeholder="e.g., Create a premium jewelry website with a gold and black theme..."></textarea>
            
            <button onclick="generateApp()" id="genBtn"
                class="w-full py-4 bg-blue-600 hover:bg-blue-500 rounded-xl font-bold text-lg shadow-lg transform transition active:scale-95">
                Generate Full-Stack Project
            </button>
        </div>

        <div id="statusBox" class="mt-8 hidden">
            <div class="flex items-center justify-between mb-2">
                <div class="flex items-center space-x-3">
                    <div id="spinner" class="animate-spin rounded-full h-5 w-5 border-b-2 border-white"></div>
                    <p id="statusText" class="text-blue-400 font-medium">Processing...</p>
                </div>
                <div class="text-right">
                    <span id="progressPercent" class="text-xs font-mono text-emerald-400">0%</span>
                    <span class="text-xs text-slate-500 block">Live Agent Logs</span>
                </div>
            </div>
            
            <div class="w-full bg-slate-900 h-1 rounded-full mb-4 overflow-hidden">
                <div id="progressBar" class="bg-emerald-500 h-full w-0 transition-all duration-500"></div>
            </div>

            <pre id="fileList" class="bg-black/80 p-4 rounded-lg font-mono text-xs text-emerald-400 h-64 overflow-y-auto border border-slate-700 whitespace-pre-wrap"></pre>
        </div>
    </div>

    <script>
        function log(message, type = 'SYSTEM') {
            const fileList = document.getElementById('fileList');
            const time = new Date().toLocaleTimeString();
            const colorClass = type === 'CRITICAL ERROR' ? 'text-red-400' : (type === 'CODER' ? 'text-blue-300' : 'text-emerald-400');
            
            const line = document.createElement('div');
            line.className = 'log-line mb-1';
            line.innerHTML = `<span class="text-slate-500">[${time}]</span> <span class="${colorClass}">[${type}]</span> > ${message}`;
            
            fileList.appendChild(line);
            fileList.scrollTop = fileList.scrollHeight;
        }

        function updateProgress(percent) {
            document.getElementById('progressBar').style.width = percent + '%';
            document.getElementById('progressPercent').innerText = percent + '%';
        }

        async function generateApp() {
            const prompt = document.getElementById('prompt').value;
            const btn = document.getElementById('genBtn');
            const statusBox = document.getElementById('statusBox');
            const fileList = document.getElementById('fileList');
            const statusText = document.getElementById('statusText');
            const spinner = document.getElementById('spinner');

            if (!prompt) return alert("Please enter a prompt!");

            // UI Initial State
            btn.disabled = true;
            btn.innerText = "Building...";
            statusBox.classList.remove('hidden');
            spinner.classList.remove('hidden');
            fileList.innerHTML = ''; // Clear previous logs
            updateProgress(5);
            
            log("Initializing Agents...", "SYSTEM");
            
            // Artificial delay for "thinking" feel
            setTimeout(() => {
                log("Architect: Analyzing project requirements...", "SYSTEM");
                updateProgress(15);
            }, 1000);

            try {
                const response = await fetch(`http://127.0.0.1:8000/generate?prompt=${encodeURIComponent(prompt)}`, {
                    method: 'POST'
                });
                
                const data = await response.json();

                if (response.ok && data.files) {
                    updateProgress(40);
                    log("Architect: Blueprint finalized. Schema created.", "SYSTEM");
                    
                    // Simulate Coder working through the files returned
                    let currentProgress = 40;
                    const step = 60 / data.files.length;

                    for (const file of data.files) {
                        await new Promise(r => setTimeout(r, 400)); // Visual "processing" delay
                        log(`Created: ${file}`, "CODER");
                        currentProgress += step;
                        updateProgress(Math.round(currentProgress));
                    }

                    updateProgress(100);
                    statusText.innerText = "Success!";
                    statusText.className = "text-emerald-400 font-medium";
                    spinner.classList.add('hidden');

                    log(`Generation Status: ${data.status}`, "SYSTEM");
                    log(`Project Root: generated_project/`, "SYSTEM");
                    log(`Database seeded with sample data.`, "DB");
                    log(`To run backend: ${data.instructions.backend}`, "NEXT");

                } else {
                    throw new Error(data.status || data.detail || "Check backend terminal.");
                }
            } catch (err) {
                log(err.message, "CRITICAL ERROR");
                statusText.innerText = "Failed.";
                statusText.className = "text-red-400 font-medium";
                spinner.classList.add('hidden');
            } finally {
                btn.disabled = false;
                btn.innerText = "Generate Full-Stack Project";
            }
        }
    </script>
</body>
</html>
